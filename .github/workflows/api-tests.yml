name: api-tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install myvoice from source (PyPI not yet)
        run: |
          git clone https://github.com/dbbaskette/myvoice /tmp/myvoice
          uv pip install --system -e /tmp/myvoice
      - name: Sync deps
        run: uv sync
      - name: Pytest
        run: uv run pytest packages/api/tests -q
      - name: Ruff
        run: uv run ruff check packages/api
      - name: Mypy
        run: uv run mypy packages/api
