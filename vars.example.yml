# Template for the CF manifest vars file.
#
#   cp vars.example.yml vars.yml      # vars.yml is gitignored
#   # edit vars.yml for your foundation, then:
#   cf push --vars-file vars.yml
#
# Includes SECRETS. vars.yml is gitignored, so your real values stay out of git.
# NEVER put real secrets in THIS example file — it ships placeholders only.

# Application name — also the route host (<app_name>.<apps_domain>).
app_name: blogforge

# Your foundation's shared apps domain (cf domains). The OAuth callback to
# register in GitHub is:  https://<app_name>.<apps_domain>/api/auth/github/callback
apps_domain: apps.example.com

# Seeded admin identity; the GitHub admin login adopts this row on first sign-in.
admin_email: you@example.com

# Comma-separated GitHub logins allowed to sign in; one is the admin.
github_allowlist: your-gh-login
github_admin_login: your-gh-login

# --- SECRETS (real values go in vars.yml only — never commit them) ---
# GitHub OAuth App credentials: github.com -> Settings -> Developer settings -> OAuth Apps.
github_client_id: your-oauth-app-client-id
github_client_secret: your-oauth-app-client-secret
# Session-cookie signing key. Generate a strong one:  openssl rand -hex 32
session_secret: replace-with-a-64-char-hex-string
