---
applications:
  - name: ((app_name))
    memory: 512M
    instances: 1
    buildpacks:
      - python_buildpack
    command: python -m blogforge serve --host 0.0.0.0 --port $PORT --no-browser
    routes:
      - route: ((app_name)).((apps_domain))
    services:
      - blogforge-postgres
      - blogforge-s3
      - tanzu-all-models
    env:
      # ----------------------------------------------------------------------
      # Non-secret, per-environment values come from the vars file:
      #   cf push --vars-file vars.yml
      #
      # Secrets ALSO come from the vars file. vars.yml is gitignored — NEVER
      # commit real values; vars.example.yml ships placeholders only. The keys:
      #   github_client_id, github_client_secret, session_secret
      #
      # The Tanzu config adapter maps VCAP_SERVICES -> BLOGFORGE_DATABASE_URL
      # and BLOGFORGE_S3_* at startup (postgres + s3 bindings above).
      # ----------------------------------------------------------------------
      # Run from source (no pip install) so Alembic's source-relative migration
      # path resolves; blogforge lives under packages/api.
      PYTHONPATH: packages/api
      BLOGFORGE_PUBLIC_URL: https://((app_name)).((apps_domain))
      BLOGFORGE_ADMIN_EMAIL: ((admin_email))
      BLOGFORGE_GITHUB_ALLOWLIST: ((github_allowlist))
      BLOGFORGE_GITHUB_ADMIN_LOGIN: ((github_admin_login))
      # Secrets, interpolated from vars.yml (gitignored) — see vars.example.yml.
      BLOGFORGE_GITHUB_CLIENT_ID: ((github_client_id))
      BLOGFORGE_GITHUB_CLIENT_SECRET: ((github_client_secret))
      BLOGFORGE_SESSION_SECRET: ((session_secret))
      # Production serves over TLS — sign session cookies as Secure.
      BLOGFORGE_COOKIE_SECURE: "true"
      BLOGFORGE_S3_BUCKET: blogforge
      BLOGFORGE_S3_REGION: us-east-1
      BLOGFORGE_RUN_MIGRATIONS_ON_BOOT: "true"
      # Empty — api and web share an origin, so CORS is unnecessary.
      BLOGFORGE_CORS_ORIGINS: ""
